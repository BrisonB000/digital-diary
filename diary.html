<!DOCTYPE html>
<html>
<head>
    <title>Diary Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>IRON DIARY DASHBOARD ⚡</h1>

<p id="today"></p>
<h2>📅 Calendar</h2>

<div style="display:flex; gap:10px; align-items:center;">
    <button onclick="changeMonth(-1)">⬅</button>
    <h3 id="monthYear"></h3>
    <button onclick="changeMonth(1)">➡</button>
</div>

<div id="calendar" style="
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap:5px;
    margin-top:10px;
"></div>

<br>

<input type="date" id="selectedDate">
<p id="viewingDate"></p>

<br><br>

<input type="text" id="title" placeholder="Diary Title">

<br><br>

<textarea id="entry" placeholder="Write your diary..." rows="8" cols="40"></textarea>

<br><br>

<button onclick="enableEdit()">Edit</button>
<button onclick="saveEntry()">Save</button>
<button onclick="deleteEntry()">Delete</button>




<script type="module">
import { supabase } from './supabase.js';


// 
// i. CONTENT SLIDER
// 

let tips = [
    "Write daily to improve memory ⚡",
    "Your thoughts matter 🧠",
    "Iron Diary secures your life 🔒"
];

let i = 0;

setInterval(() => {
    let todayBox = document.getElementById("today");
    if (todayBox) {
        todayBox.innerText =
            "Today: " + new Date().toDateString() +
            " | " + tips[i];
        i = (i + 1) % tips.length;
    }
}, 3000);

let currentDate = new Date();
let diaryMap = {};

let selectedDateValue = new Date().toISOString().split("T")[0];
document.getElementById("selectedDate").value = selectedDateValue;

async function loadDiaryMap() {

    let { data: userData } = await supabase.auth.getUser();
    let user = userData.user;

    let { data } = await supabase
    .from("diaries")
    .select("*")
    .eq("user_id", user.id);

    diaryMap = {};

    data.forEach(d => {
        diaryMap[d.entry_date] = d.entry;
    });

    renderCalendar();
}

function renderCalendar() {

    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();

    document.getElementById("monthYear").innerText =
        currentDate.toLocaleString('default', { month: 'long' }) + " " + year;

    let firstDay = new Date(year, month, 1).getDay();
    let days = new Date(year, month + 1, 0).getDate();

    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for (let i = 0; i < firstDay; i++) {
        cal.innerHTML += `<div></div>`;
    }

    for (let d = 1; d <= days; d++) {

       let dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

let hasEntry = diaryMap[dateStr];
let isSelected = dateStr === selectedDateValue;

let bgColor = hasEntry ? "#00d9ff" : "rgba(255,255,255,0.1)";
let borderStyle = isSelected ? "2px solid gold" : "1px solid transparent";
let boxShadow = isSelected ? "0 0 12px gold" : "none";
let textColor = hasEntry ? "black" : "white";

cal.innerHTML += `
    <div onclick="selectDate('${dateStr}')"
        style="
            padding:10px;
            text-align:center;
            border-radius:8px;
            cursor:pointer;
            background:${bgColor};
            border:${borderStyle};
            box-shadow:${boxShadow};
            color:${textColor};
            font-weight:bold;
        ">
        ${d}
        <br>
        ${hasEntry ? "⚡" : ""}
    </div>
`;
    }
}

function updateViewingDate(date) {
    let formatted = new Date(date).toLocaleDateString("en-GB", {
        day: "numeric",
        month: "long",
        year: "numeric"
    });

    document.getElementById("viewingDate").innerText =
        "Viewing diary for: " + formatted;
}

window.changeMonth = function(val) {
    currentDate.setMonth(currentDate.getMonth() + val);
    renderCalendar();
}

window.selectDate = function(date) {
    selectedDateValue = date;
    document.getElementById("selectedDate").value = date;
    updateViewingDate(date);
    loadEntryByDate(date);
    renderCalendar();
}

window.enableEdit = function () {
    document.getElementById("title").readOnly = false;
    document.getElementById("entry").readOnly = false;
    alert("Edit mode enabled ⚡");
};
async function loadEntryByDate(date) {
    let { data: userData } = await supabase.auth.getUser();
    let user = userData.user;

    let { data, error } = await supabase
        .from("diaries")
        .select("*")
        .eq("user_id", user.id)
        .eq("entry_date", date)
        .maybeSingle();

    if (error) {
        alert(error.message);
        return;
    }

    if (data) {
        document.getElementById("title").value = data.title || "";
        document.getElementById("entry").value = data.entry || "";

        document.getElementById("title").readOnly = true;
        document.getElementById("entry").readOnly = true;
    } else {
        document.getElementById("title").value = "";
        document.getElementById("entry").value = "";

        document.getElementById("title").readOnly = false;
        document.getElementById("entry").readOnly = false;
    }
}
loadDiaryMap();

updateViewingDate(document.getElementById("selectedDate").value);

document.getElementById("selectedDate").addEventListener("change", function () {
    selectedDateValue = this.value;
    updateViewingDate(this.value);
    loadEntryByDate(this.value);
    renderCalendar();
});
// 
// iv. COOKIES


function setCookie(name, value) {
    document.cookie = name + "=" + value;
}

function getCookie(name) {
    let cookies = document.cookie.split(";");
    for (let c of cookies) {
        let [k, v] = c.trim().split("=");
        if (k === name) return v;
    }
    return "";
}



// vi. EVENT (DOM LOADED)


document.addEventListener("DOMContentLoaded", () => {
    alert("Welcome " + (getCookie("loggedEmail") || "User") + " ⚡");
});



// vii. ALERT / CONFIRM


function confirmSave() {
    return confirm("Do you want to save this diary entry?");
}



// viii. VALIDATION (5 RULES)


function validateEntry(entry) {

    if (!entry) {
        alert("Entry is empty");
        return false;
    }

    if (entry.length < 5) {
        alert("Entry too short (min 5 chars)");
        return false;
    }

    if (entry.length > 5000) {
        alert("Entry too long");
        return false;
    }

    if (entry.includes("<script")) {
        alert("Invalid content");
        return false;
    }

    if (entry.trim() === "") {
        alert("Only spaces not allowed");
        return false;
    }

    return true;
}


// =========================
// SAVE ENTRY (DOM + SUPABASE)
// =========================


function generateAI(text) {

    let title = "Diary Entry";
    let emoji = "📝";

    let t = text.toLowerCase();

    if (t.includes("happy")) { title="Happy Day"; emoji="😊"; }
    else if (t.includes("sad")) { title="Sad Day"; emoji="😔"; }
    else if (t.includes("study")) { title="Study Day"; emoji="📚"; }
    else if (t.includes("travel")) { title="Travel Day"; emoji="✈️"; }
    else if (t.includes("game")) { title="Fun Day"; emoji="🎮"; }

    return { title, emoji };
}



// LOAD ENTRIES (DYNAMIC UI)

window.saveEntry = async function () {

    let selectedDate = document.getElementById("selectedDate").value;
    let title = document.getElementById("title").value;
    let entry = document.getElementById("entry").value;

    // validation
    if (!validateEntry(entry)) return;

    // confirm
    if (!confirmSave()) return;

    let { data: userData } = await supabase.auth.getUser();
    let user = userData.user;

    // check if entry already exists for this date
    let { data: existingEntry, error: checkError } = await supabase
        .from("diaries")
        .select("*")
        .eq("user_id", user.id)
        .eq("entry_date", selectedDate)
        .maybeSingle();

    if (checkError) {
        alert(checkError.message);
        return;
    }

    let aiData = generateAI(entry);

    if (existingEntry) {
        // UPDATE existing diary
        let { error } = await supabase
            .from("diaries")
            .update({
                title: title || aiData.title,
                entry: entry,
                emoji: aiData.emoji
            })
            .eq("user_id", user.id)
            .eq("entry_date", selectedDate);

        if (error) {
            alert(error.message);
            return;
        }

        alert("Diary updated successfully ⚡");
    } else {
        // INSERT new diary
        let { error } = await supabase
            .from("diaries")
            .insert([
                {
                    user_id: user.id,
                    title: title || aiData.title,
                    entry: entry,
                    entry_date: selectedDate,
                    emoji: aiData.emoji
                }
            ]);

        if (error) {
            alert(error.message);
            return;
        }

        alert("Diary saved successfully ⚡");
    }

   loadDiaryMap();
loadEntryByDate(selectedDate);


document.getElementById("title").readOnly = true;
document.getElementById("entry").readOnly = true;

};
window.deleteEntry = async function () {
    let selectedDate = document.getElementById("selectedDate").value;

    if (!selectedDate) {
        alert("Please select a date first.");
        return;
    }

    let confirmDelete = confirm("Are you sure you want to delete this diary entry?");
    if (!confirmDelete) return;

    let { data: userData } = await supabase.auth.getUser();
    let user = userData.user;

    let { error } = await supabase
        .from("diaries")
        .delete()
        .eq("user_id", user.id)
        .eq("entry_date", selectedDate);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Diary deleted successfully 🗑️");

    document.getElementById("title").value = "";
    document.getElementById("entry").value = "";
    document.getElementById("title").readOnly = false;
    document.getElementById("entry").readOnly = false;

    loadDiaryMap();
   
};



// initial load

</script>

</body>
</html>
